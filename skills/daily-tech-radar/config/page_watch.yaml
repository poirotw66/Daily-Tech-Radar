page_watch:
  - name: Claude Blog
    url: https://claude.com/blog
    enabled: true
    priority: high
    categories: [Agent, AI Engineering, LLM App]
    check_interval_hours: 24

  - name: Anthropic Newsroom
    url: https://www.anthropic.com/news
    enabled: true
    priority: high
    categories: [Agent, AI Engineering]
    check_interval_hours: 24

policy:
  note: >
    Pages without RSS are checked by article link list on listing pages (Claude Blog, Anthropic Newsroom).
    First run stores tracked URLs as baseline; later runs emit one source item per new article URL.
    Content fingerprint is fallback when link extraction returns nothing.
  recommended_pages:
    - Claude Blog
    - Anthropic Newsroom
