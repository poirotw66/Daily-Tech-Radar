policy:
  note: Some feeds may fail behind corporate proxy or due to redirect loops. The orchestrator treats RSS sources as recoverable.
  recommended_mvp_sources:
    - GitHub Blog
    - GitHub AI & ML
    - Cloudflare Blog
    - Cloudflare Blog (AI tag)
    - OpenAI News
    - InfoQ AI ML Data Engineering
    - Hugging Face Blog
    - Google Developers Blog
    - Google AI (Technology)
    - AWS Machine Learning Blog
    - Simon Willison's Weblog
    - LangChain Blog
    - CrewAI Blog
    - Microsoft Semantic Kernel
    - Finextra (AI)
    - Plaid Blog
    - Modern Treasury Journal
    - Stripe Blog
  human_workflow:
    - Run daily discover (default DISCOVER_ONLY=1) to produce source + topic selection briefs.
    - User picks candidate_id, then run_article_from_pick.sh for draft and review package.
