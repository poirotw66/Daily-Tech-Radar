  - name: GitHub AI & ML
    url: https://github.blog/ai-and-ml/feed/
    enabled: true
    priority: high
    categories: [AI Engineering, DevTools]

  - name: Cloudflare Blog
    url: https://blog.cloudflare.com/rss/
    enabled: true
    priority: high
    categories: [Infrastructure, AI Engineering, DevTools]

  - name: Vercel Blog
    url: https://vercel.com/rss.xml
    enabled: false
    priority: medium
    categories: [DevTools, Web, AI SDK]
